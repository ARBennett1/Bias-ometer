<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bias-ometer · Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07090f;
  --surf:    #0c0f1a;
  --surf2:   #111526;
  --surf3:   #171c30;
  --bord:    #1b2136;
  --bord2:   #232c47;
  --text:    #c6d4f0;
  --dim:     #4f607d;
  --accent:  #00cfaa;
  --blue:    #4d8bfa;
  --amber:   #f5a623;
  --green:   #22d07a;
  --red:     #f03060;
  --purple:  #a78bfa;
  --radius:  6px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── Header ── */
header {
  height: 52px;
  background: var(--surf);
  border-bottom: 1px solid var(--bord);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--accent);
  white-space: nowrap;
  letter-spacing: 0.02em;
}

#session-select {
  background: var(--surf2);
  border: 1px solid var(--bord2);
  color: var(--text);
  border-radius: var(--radius);
  padding: 4px 8px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  min-width: 220px;
  cursor: pointer;
  outline: none;
}
#session-select:focus { border-color: var(--accent); }

/* Spinner */
.spinner {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 2px solid var(--bord);
  border-top-color: var(--accent);
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

#hdr-stats {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  flex-wrap: wrap;
}

.stat-chip {
  background: var(--surf3);
  border: 1px solid var(--bord2);
  border-radius: 20px;
  padding: 2px 8px;
  font-size: 11px;
  color: var(--dim);
  white-space: nowrap;
}
.stat-chip strong { color: var(--text); font-weight: 600; }

#merge-tuning-btn {
  background: var(--surf3);
  border: 1px solid var(--bord2);
  color: var(--dim);
  border-radius: var(--radius);
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
#merge-tuning-btn:hover { color: var(--text); border-color: var(--accent); }

#rescan-btn {
  background: none;
  border: 1px solid var(--bord2);
  color: var(--dim);
  border-radius: var(--radius);
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
#rescan-btn:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
#rescan-btn:disabled { opacity: 0.45; cursor: not-allowed; }

#rescan-status {
  font-size: 11px;
  color: var(--dim);
  white-space: nowrap;
  font-family: 'IBM Plex Mono', monospace;
}

/* ── Main layout ── */
.panels {
  display: flex;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ── Left Panel ── */
.left-panel {
  width: 270px;
  flex-shrink: 0;
  background: var(--surf);
  border-right: 1px solid var(--bord);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.left-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--bord);
  flex-shrink: 0;
}

.left-header h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
  flex: 1;
}

.vis-btn {
  background: var(--surf3);
  border: 1px solid var(--bord2);
  color: var(--dim);
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 11px;
  cursor: pointer;
  transition: color 0.15s;
}
.vis-btn:hover { color: var(--text); }

#speakers-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Speaker Cards ── */
.speaker-card {
  background: var(--surf2);
  border: 1px solid var(--bord);
  border-radius: var(--radius);
  padding: 10px;
  transition: opacity 0.2s;
}
.speaker-card.sp-hidden-card { opacity: 0.5; }

.sp-card-top {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.sp-thumb {
  width: 56px;
  height: 56px;
  border-radius: var(--radius);
  object-fit: cover;
  flex-shrink: 0;
}

.sp-thumb-initials {
  width: 56px;
  height: 56px;
  border-radius: var(--radius);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: #fff;
  opacity: 0.85;
}

.sp-info {
  flex: 1;
  min-width: 0;
}

.sp-name {
  font-weight: 600;
  font-size: 13px;
  line-height: 1.3;
  word-break: break-word;
}

.sp-eph {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  word-break: break-all;
}

.sp-affil {
  font-size: 11px;
  color: var(--dim);
  margin-top: 2px;
}

.sp-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}

.chip {
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
  font-weight: 500;
  display: inline-block;
}
.chip-hi  { background: rgba(34,208,122,0.15); color: var(--green);  border: 1px solid rgba(34,208,122,0.3); }
.chip-med { background: rgba(245,166,35,0.15);  color: var(--amber);  border: 1px solid rgba(245,166,35,0.3); }
.chip-low { background: rgba(79,96,125,0.15);   color: var(--dim);    border: 1px solid rgba(79,96,125,0.3); }
.chip-ghost  { background: rgba(245,166,35,0.12); color: var(--amber);  border: 1px solid rgba(245,166,35,0.25); }
.chip-eph    { background: var(--surf3); color: var(--dim); border: 1px solid var(--bord2); font-family: 'IBM Plex Mono', monospace; }
.chip-ovr    { background: rgba(0,207,170,0.12);  color: var(--accent); border: 1px solid rgba(0,207,170,0.25); }
.chip-merged { background: rgba(77,139,250,0.12); color: var(--blue);   border: 1px solid rgba(77,139,250,0.25); }
.chip-sent-pos { background: rgba(34,208,122,0.1);  color: var(--green); border: 1px solid rgba(34,208,122,0.2); }
.chip-sent-neg { background: rgba(240,48,96,0.1);   color: var(--red);   border: 1px solid rgba(240,48,96,0.2); }
.chip-sent-neu { background: var(--surf3); color: var(--dim); border: 1px solid var(--bord2); }

.hint-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 4px;
}

.hint-pill {
  background: rgba(245,166,35,0.12);
  color: var(--amber);
  border: 1px solid rgba(245,166,35,0.3);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
  cursor: pointer;
  transition: background 0.15s;
}
.hint-pill:hover { background: rgba(245,166,35,0.25); }

.sp-time-bar-wrap {
  margin-top: 8px;
}

.sp-time-bar-track {
  height: 4px;
  background: var(--surf3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 3px;
}

.sp-time-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}

.sp-time-label {
  font-size: 10px;
  color: var(--dim);
  font-family: 'IBM Plex Mono', monospace;
}

.sp-card-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.eye-btn {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  line-height: 1;
  transition: color 0.15s;
}
.eye-btn:hover { color: var(--text); }

.sp-action-btn {
  border: none;
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
}
.sp-action-btn:hover { opacity: 0.8; }
.btn-confirm  { background: rgba(34,208,122,0.15); color: var(--green);  border: 1px solid rgba(34,208,122,0.3); }
.btn-link-sp  { background: rgba(240,48,96,0.15);  color: var(--red);    border: 1px solid rgba(240,48,96,0.3); }
.btn-merge-sp { background: rgba(167,139,250,0.15); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }

.merge-form {
  margin-top: 8px;
  display: none;
  background: var(--surf3);
  border: 1px solid var(--bord2);
  border-radius: var(--radius);
  padding: 8px;
  flex-direction: column;
  gap: 6px;
}
.merge-form.visible { display: flex; }

.merge-form select {
  background: var(--surf2);
  border: 1px solid var(--bord2);
  color: var(--text);
  border-radius: 4px;
  padding: 4px 6px;
  font-size: 12px;
  width: 100%;
}

.merge-form-btns {
  display: flex;
  gap: 6px;
}

.merge-form-btns button {
  flex: 1;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid var(--bord2);
}

.merge-cancel-btn { background: var(--surf2); color: var(--dim); }
.merge-go-btn { background: rgba(167,139,250,0.2); color: var(--purple); border-color: rgba(167,139,250,0.3) !important; }

/* ── Right Panel ── */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── Tab Bar ── */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--bord);
  background: var(--surf);
  flex-shrink: 0;
}

.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--dim);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

.tab-badge {
  background: var(--surf3);
  border: 1px solid var(--bord2);
  border-radius: 10px;
  padding: 0 6px;
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--dim);
  min-width: 20px;
  text-align: center;
}
.tab-btn.active .tab-badge { color: var(--accent); border-color: var(--accent); background: rgba(0,207,170,0.08); }

/* ── Tab Panes ── */
.tab-pane {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
}
.tab-pane.active { display: flex; }

/* ── Merge Panel ── */
#merge-panel {
  background: var(--surf2);
  border-bottom: 1px solid var(--bord);
  flex-shrink: 0;
}

.merge-panel-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  flex-wrap: wrap;
}

.merge-panel-inner label {
  font-size: 12px;
  color: var(--dim);
  white-space: nowrap;
}

#gap-slider {
  accent-color: var(--accent);
  width: 100px;
  cursor: pointer;
}

#gap-input {
  background: var(--surf3);
  border: 1px solid var(--bord2);
  color: var(--text);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  width: 60px;
  text-align: center;
}

.merge-panel-inner span {
  font-size: 12px;
  color: var(--dim);
}

.merge-panel-inner button {
  background: var(--surf3);
  border: 1px solid var(--bord2);
  color: var(--text);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  transition: border-color 0.15s;
  white-space: nowrap;
}
.merge-panel-inner button:hover { border-color: var(--accent); }

#merge-counts {
  font-size: 11px;
  color: var(--dim);
  font-family: 'IBM Plex Mono', monospace;
}

/* ── Transcript Toolbar ── */
.transcript-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 16px;
  border-bottom: 1px solid var(--bord);
  background: var(--surf);
  flex-shrink: 0;
}

#turn-stats {
  flex: 1;
  font-size: 11px;
  color: var(--dim);
  font-family: 'IBM Plex Mono', monospace;
}

.ghost-toggle {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--dim);
  cursor: pointer;
  white-space: nowrap;
}
.ghost-toggle input { accent-color: var(--accent); cursor: pointer; }

/* ── Preview Banner ── */
.preview-banner {
  background: rgba(245,166,35,0.1);
  border-bottom: 1px solid rgba(245,166,35,0.3);
  padding: 6px 16px;
  font-size: 12px;
  color: var(--amber);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

/* ── Transcript List ── */
#transcript-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

/* ── Turn Rows ── */
.turn-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 0.12s;
  outline: none;
  position: relative;
}
.turn-row:hover { background: var(--surf2); }
.turn-row.focused { background: var(--surf2); border-color: var(--accent); outline: 1px solid rgba(0,207,170,0.3); }
.turn-row.deleted { opacity: 0.4; }
.turn-row.deleted .turn-transcript { text-decoration: line-through; }
.turn-row.ghost-turn { opacity: 0.28; }
.turn-row.overridden { border-left: 3px solid var(--accent); padding-left: 8px; }
.turn-row.sp-hidden { display: none !important; }

.turn-ts {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  white-space: nowrap;
  padding-top: 3px;
  min-width: 38px;
}

.speaker-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 6px;
}

.turn-body {
  flex: 1;
  min-width: 0;
}

.turn-speaker {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.orig-sp {
  color: var(--dim);
  font-weight: 400;
  text-decoration: line-through;
  font-size: 10px;
}

.turn-transcript {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  word-break: break-word;
}

.turn-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}

/* Subturn drawer */
.subturn-toggle {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 11px;
  cursor: pointer;
  padding: 2px 0;
  margin-top: 4px;
  display: inline-block;
}
.subturn-toggle:hover { color: var(--text); }

.subturn-drawer {
  margin-top: 6px;
  background: var(--surf3);
  border: 1px solid var(--bord);
  border-radius: 4px;
  overflow: hidden;
}

.subturn-row {
  display: flex;
  gap: 8px;
  padding: 4px 8px;
  border-bottom: 1px solid var(--bord);
  font-size: 11px;
}
.subturn-row:last-child { border-bottom: none; }

.subturn-ts {
  font-family: 'IBM Plex Mono', monospace;
  color: var(--dim);
  white-space: nowrap;
  flex-shrink: 0;
}

.subturn-text {
  color: var(--text);
  flex: 1;
}

/* Turn actions */
.turn-actions {
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.turn-row:hover .turn-actions,
.turn-row.focused .turn-actions { opacity: 1; }

.icon-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--dim);
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 12px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  line-height: 1;
}
.icon-btn:hover { color: var(--text); border-color: var(--bord2); background: var(--surf3); }
.btn-delete:hover  { color: var(--red);   border-color: rgba(240,48,96,0.3); }
.btn-restore:hover { color: var(--green); border-color: rgba(34,208,122,0.3); }

.reassign-wrap {
  display: flex;
  align-items: center;
  gap: 3px;
}

.reassign-select {
  background: var(--surf3);
  border: 1px solid var(--bord2);
  color: var(--text);
  border-radius: 4px;
  padding: 2px 4px;
  font-size: 11px;
  max-width: 120px;
}

/* ── Frame Gallery ── */
#frame-gallery {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  align-content: start;
}

.frame-card {
  background: var(--surf2);
  border: 1px solid var(--bord);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s;
}
.frame-card:hover { border-color: var(--bord2); transform: translateY(-1px); }

.frame-img-wrap {
  position: relative;
  aspect-ratio: 16/9;
  background: var(--surf3);
  overflow: hidden;
}

.frame-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.frame-ts-badge {
  position: absolute;
  bottom: 6px;
  left: 6px;
  background: rgba(7,9,15,0.8);
  color: var(--dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 3px;
}

.frame-card-body {
  padding: 10px;
}

.frame-sp-name {
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 3px;
}

.frame-identity {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 6px;
  line-height: 1.4;
}

.frame-raw-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  max-height: 80px;
  overflow: hidden;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.4;
  margin-bottom: 8px;
}

.frame-footer {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--dim);
  font-size: 14px;
  text-align: center;
  padding: 40px;
  min-height: 200px;
}

/* ── Names Tab ── */
#names-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.names-table {
  width: 100%;
  border-collapse: collapse;
}

.names-table th {
  text-align: left;
  font-size: 11px;
  color: var(--dim);
  font-weight: 600;
  padding: 6px 10px;
  border-bottom: 1px solid var(--bord);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.names-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--bord);
  font-size: 13px;
  vertical-align: middle;
}

.names-table tr:hover td { background: var(--surf2); }

.name-cell {
  font-weight: 600;
  color: var(--text);
}

.sp-label { font-weight: 500; }

.mono {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--dim);
}

.jump-btn {
  background: var(--surf3);
  border: 1px solid var(--bord2);
  color: var(--dim);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
.jump-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ── Modals ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(7,9,15,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;

}

.modal-box {
  background: var(--surf);
  border: 1px solid var(--bord2);
  border-radius: calc(var(--radius) * 1.5);
  min-width: 360px;
  max-width: 520px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);

.fm-box {
  max-width: 860px;
  width: 95%;
}

.modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--bord);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 14px;
}

.close-btn {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;

.modal-body {
  padding: 16px;

</style>
</head>
<body>

  <div class="modal-box fm-box">

<div id="link-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeLinkModal()">

<div id="toast-container"></div>

<!-- ── Header ── -->

  <select id="session-select" onchange="onSessionChange()">

<!-- ── Panels ── -->

        Transcript <span class="tab-badge" id="badge-transcript">0</span>
      </button>
      <button class="tab-btn" id="tab-btn-frames" onclick="switchTab('frames')">
        Frame Gallery <span class="tab-badge" id="badge-frames">0</span>
      </button>
      <button class="tab-btn" id="tab-btn-names" onclick="switchTab('names')">
        Names Mentioned <span class="tab-badge" id="badge-names">0</span>
      </button>

    <!-- Transcript Tab -->

          <input type="range" id="gap-slider" min="0" max="5" step="0.5" value="2" oninput="updateMergeGap(this.value)">

<script>'use strict';

// ── Global State ──
let _session = null, _speakers = [], _allTurns = [], _turnByIdx = {}, _ghostMap = {};
let _spById = {}, _allEphIds = [];
let _mergeGap = 2, _mergePreview = null, _previewActive = false;
let _fmSpeakers = [], _fmIdx = 0, _fmFromTurn = false, _fmTurnIdx = null;
let _confirmEphId = null, _confirmCatalogueId = null;
let _linkEphId = null;
let _currentAudio = null;
let _searchDebounce = null;
const hiddenSpeakers = new Set();
const _spColorCache = {};
let _spColorIdx = 0;

// ── Speaker Color Palette ──
const PALETTE = [
  '#00cfaa','#4d8bfa','#f5a623','#a78bfa','#f03060',
  '#22d07a','#fb923c','#38bdf8','#e879f9','#84cc16',
  '#06b6d4','#ec4899','#facc15','#4ade80','#f87171'
];

function spColor(id) {
  if (id && !_spColorCache[id]) {
    _spColorCache[id] = PALETTE[_spColorIdx % PALETTE.length];
    _spColorIdx++;
  }
  return _spColorCache[id] || '#666';
}

// ── Utility Functions ──
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function fmtTime(secs) {
  if (secs == null || isNaN(secs)) return '--:--';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function fmtDur(secs) {
  if (!secs) return '0s';
  if (secs < 60) return `${Math.round(secs)}s`;
  return `${Math.floor(secs/60)}m${Math.round(secs%60)}s`;
}

function confClass(c) {
  if (c >= 0.7) return 'chip-hi';
  if (c >= 0.4) return 'chip-med';
  return 'chip-low';
}

function displayName(ephId) {
  const sp = _spById?.[ephId];
  return sp ? (sp.display_name || ephId) : (ephId || '?');
}

function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

// ── API Helper ──
async function api(method, path, body) {
  const opts = { method };
  if (body) opts.body = body;
  const res = await fetch(path, opts);
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`${res.status} ${text || res.statusText}`);
  }
  return res.status === 204 ? null : res.json();
}

// ── Spinner ──
function showSpinner(v) {
  const el = document.getElementById('spinner');
  if (el) el.style.display = v ? 'block' : 'none';
}

// ── Toast ──
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3600);
}

// ── Ghost Map ──
function buildGhostMap(turns) {
  const ghosts = {};
  for (const t of turns) {
    const hasText = t.transcript && t.transcript.trim();
    if (hasText) continue;
    const overlaps = turns.some(other => {
      if (other.index === t.index) return false;
      if (!other.transcript || !other.transcript.trim()) return false;
      return t.start < other.end && t.end > other.start;
    });
    if (overlaps) ghosts[t.index] = true;
  }
  return ghosts;
}

// ── Names Mentions ──
function buildNamesMentions() {
  const allHints = new Set();
  for (const sp of _speakers) {
    for (const h of (sp.name_hints || [])) allHints.add(h);
  }

  const mentions = [];
  for (const turn of _allTurns) {
    if (turn.deleted) continue;
    if (!turn.transcript) continue;
    const lower = turn.transcript.toLowerCase();
    for (const name of allHints) {
      if (lower.includes(name.toLowerCase())) {
        const spId = turn.effective_speaker || turn.original_speaker;
        const sp = _spById[spId];
        mentions.push({
          name,
          speakerId: spId,
          displayName: sp ? (sp.display_name || sp.ephemeral_id) : spId,
          turnStart: turn.start,
          turnIndex: turn.index
        });
      }
    }
  }

  mentions.sort((a, b) => a.turnStart - b.turnStart);

  const deduped = [];
  const lastSeen = {};
  for (const m of mentions) {
    const key = `${m.name.toLowerCase()}|${m.speakerId}`;
    if (lastSeen[key] !== undefined && m.turnStart - lastSeen[key] < 60) continue;
    lastSeen[key] = m.turnStart;
    deduped.push(m);
  }

  return deduped;
}

// ── Speaker Visibility ──
function toggleSpVis(id) {
  if (hiddenSpeakers.has(id)) hiddenSpeakers.delete(id);
  else hiddenSpeakers.add(id);
  const card = document.querySelector(`.speaker-card[data-eph="${CSS.escape(id)}"]`);
  if (card) {
    card.classList.toggle('sp-hidden-card', hiddenSpeakers.has(id));
    const eye = card.querySelector('.eye-btn');
    if (eye) eye.textContent = hiddenSpeakers.has(id) ? '○' : '●';
  }
  applyFilters();
}

function showAllSpeakers() {
  hiddenSpeakers.clear();
  document.querySelectorAll('.speaker-card').forEach(c => {
    c.classList.remove('sp-hidden-card');
    const e = c.querySelector('.eye-btn');
    if (e) e.textContent = '●';
  });
  applyFilters();
}

function hideAllSpeakers() {
  for (const sp of _speakers) hiddenSpeakers.add(sp.ephemeral_id);
  document.querySelectorAll('.speaker-card').forEach(c => {
    c.classList.add('sp-hidden-card');
    const e = c.querySelector('.eye-btn');
    if (e) e.textContent = '○';
  });
  applyFilters();
}

function applyFilters() {
  const hideGhosts = document.getElementById('hide-ghosts')?.checked;
  document.querySelectorAll('.turn-row[data-ti]').forEach(row => {
    const ti = +row.dataset.ti;
    const turn = _turnByIdx[ti];
    if (!turn) return;
    const spId = turn.deleted
      ? turn.original_speaker
      : (turn.effective_speaker || turn.original_speaker);
    const ghost = _ghostMap[ti];
    const hide = hiddenSpeakers.has(spId) || (hideGhosts && ghost);
    row.classList.toggle('sp-hidden', hide);
  });
  updateTurnStats();
}

function updateTurnStats() {
  const hideGhosts = document.getElementById('hide-ghosts')?.checked;
  let visible = 0, total = 0;
  for (const t of _allTurns) {
    if (t.deleted) continue;
    total++;
    const spId = t.effective_speaker || t.original_speaker;
    const ghost = _ghostMap[t.index];
    if (!hiddenSpeakers.has(spId) && !(hideGhosts && ghost)) visible++;
  }
  const el = document.getElementById('turn-stats');
  if (el) el.textContent = `${visible} of ${total} turns visible`;
}

// ── Stats ──
function updateStats() {
  const activeTurns = _allTurns.filter(t => !t.deleted);
  const overrides = _allTurns.filter(t =>
    t.overridden || (t.effective_speaker && t.effective_speaker !== t.original_speaker)
  );
  const ghosts = Object.keys(_ghostMap).length;

  document.getElementById('hdr-stats').innerHTML = `
    <span class="stat-chip"><strong>${activeTurns.length}</strong> turns</span>
    <span class="stat-chip"><strong>${_speakers.length}</strong> speakers</span>
    <span class="stat-chip"><strong>${overrides.length}</strong> overrides</span>
    <span class="stat-chip"><strong>${ghosts}</strong> ghosts</span>
  `;

  updateTurnStats();

  const frameCount = _speakers.filter(s =>
    s.frame_url && String(s.frame_url).trim() &&
    s.raw_text && String(s.raw_text).trim()
  ).length;
  const namesMentions = buildNamesMentions();

  document.getElementById('badge-transcript').textContent = activeTurns.length;
  document.getElementById('badge-frames').textContent = frameCount;
  document.getElementById('badge-names').textContent = namesMentions.length;
}

// ── Tab Switching ──
function switchTab(name) {
  const tabs = ['transcript', 'frames', 'names'];
  tabs.forEach(t => {
    const pane = document.getElementById(`tab-${t}`);
    const btn  = document.getElementById(`tab-btn-${t}`);
    if (t === name) {
      if (pane) { pane.style.display = 'flex'; pane.classList.add('active'); }
      if (btn)  btn.classList.add('active');
    } else {
      if (pane) { pane.style.display = 'none'; pane.classList.remove('active'); }
      if (btn)  btn.classList.remove('active');
    }
  });
}

// ── Merge Panel Toggle ──
function toggleMergePanel() {
  const p = document.getElementById('merge-panel');
  if (p) p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

// ── Merge Gap Sync ──
function updateMergeGap(v) {
  const val = parseFloat(v);
  if (isNaN(val)) return;
  _mergeGap = val;
  const slider = document.getElementById('gap-slider');
  const input  = document.getElementById('gap-input');
  if (slider && parseFloat(slider.value) !== val) slider.value = val;
  if (input  && parseFloat(input.value)  !== val) input.value  = val;
}

// ── Merge Preview ──
async function doMergePreview() {
  if (!_session) return;
  const sid = _session.session_id;
  const gap = _mergeGap;
  try {
    const data = await api('GET', `/review/${sid}/merge-preview?gap=${gap}`);
    _mergePreview = data;
    _previewActive = true;
    const orig   = data.original_count || data.orig || 0;
    const merged = data.merged_count   || data.merged || 0;
    const diff   = orig - merged;
    const pct    = orig > 0 ? Math.round(diff / orig * 100) : 0;
    document.getElementById('merge-counts').textContent =
      `Original: ${orig} → Gap ${gap}s: ${merged} turns (-${diff}, ${pct}% reduction)`;
    renderTranscript();
  } catch(e) {
    toast(e.message, 'err');
  }
}

// ── Apply Remerge ──
async function doApplyRemerge(gapOverride) {
  if (!_session) return;
  const sid = _session.session_id;
  const gap = gapOverride !== undefined ? gapOverride : _mergeGap;
  showSpinner(true);
  try {
    const fd = new FormData();
    fd.append('merge_gap_secs', gap);
    await api('POST', `/review/${sid}/apply-remerge`, fd);
    _previewActive = false;
    _mergePreview  = null;
    document.getElementById('merge-counts').textContent = '';
    toast('Remerge applied', 'ok');
    await loadReview(sid);
  } catch(e) {
    toast(e.message, 'err');
  } finally {
    showSpinner(false);
  }
}

// ── Rescan Frames ──
let _rescanPollTimer = null;

function doRescan() {
  if (!_session) return;
  const sid = _session.session_id;
  const btn = document.getElementById('rescan-btn');
  const statusEl = document.getElementById('rescan-status');

  btn.disabled = true;
  statusEl.style.display = 'inline';
  statusEl.textContent = 'Starting…';

  api('POST', `/review/${sid}/recapture`)
    .then(() => {
      statusEl.textContent = 'Queued';
      _pollRescan(sid);
    })
    .catch(e => {
      btn.disabled = false;
      statusEl.style.display = 'none';
      toast(e.message, 'err');
    });
}

function _pollRescan(sid) {
  if (_rescanPollTimer) clearTimeout(_rescanPollTimer);

  _rescanPollTimer = setTimeout(async () => {
    const statusEl = document.getElementById('rescan-status');
    const btn = document.getElementById('rescan-btn');
    try {
      const data = await api('GET', `/review/${sid}/recapture/status`);
      const pct = data.progress_pct || 0;
      const detail = data.detail || '';

      if (data.status === 'running' || data.status === 'queued') {
        statusEl.textContent = detail ? `${pct}% · ${detail}` : `${pct}%`;
        _pollRescan(sid);
      } else if (data.status === 'complete') {
        statusEl.textContent = detail || 'Done';
        btn.disabled = false;
        toast('Rescan complete — reloading session…', 'ok');
        setTimeout(() => {
          statusEl.style.display = 'none';
          loadReview(sid);
        }, 1200);
      } else if (data.status === 'error') {
        statusEl.textContent = `Error: ${detail}`;
        btn.disabled = false;
        toast(`Rescan failed: ${detail}`, 'err');
      } else {
        // idle — no job running
        btn.disabled = false;
        statusEl.style.display = 'none';
      }
    } catch(e) {
      statusEl.textContent = 'Poll error';
      btn.disabled = false;
    }
  }, 1500);
}

  for (const sp of _speakers) {
    const ephId   = sp.ephemeral_id;
    const color   = spColor(ephId);
    const name    = sp.display_name || ephId;

    }

    html += `
<div class="speaker-card${isHidden ? ' sp-hidden-card' : ''}" data-eph="${esc(ephId)}">
  <div class="sp-card-top">
    ${thumbHtml}
    <div class="sp-info">

  <div class="sp-time-bar-wrap">
    <div class="sp-time-bar-track">

// ── Render Transcript ──
function renderTranscript() {
  const container = document.getElementById('transcript-list');
  if (!container) return;

  let html = '';

  // Preview banner
  if (_previewActive && _mergePreview) {
    html += `<div class="preview-banner">⚠ Preview active — showing merged view (gap ${_mergeGap}s). Click "Apply to session" to save.</div>`;
  }

  for (const turn of _allTurns) {
    const ti       = turn.index;
    const effSp    = turn.effective_speaker || turn.original_speaker;
    const origSp   = turn.original_speaker;
    const isDeleted  = !!turn.deleted;
    const isGhost    = !!_ghostMap[ti];
    const isOverridden = !isDeleted &&
      (turn.overridden || (turn.effective_speaker && turn.effective_speaker !== turn.original_speaker));
    const color = spColor(effSp);

    let classes = 'turn-row';
    if (isDeleted)    classes += ' deleted';
    if (isGhost && !isDeleted) classes += ' ghost-turn';
    if (isOverridden) classes += ' overridden';

    // Speaker label
    let spHtml;
    if (isOverridden) {
      spHtml = `<span class="orig-sp">${esc(displayName(origSp))}</span> → <span style="color:${color}">${esc(displayName(effSp))}</span>`;
    } else {
      spHtml = `<span style="color:${color}">${esc(displayName(effSp))}</span>`;
    }

    // Chips
    let chipsHtml = '';
    if (turn.sentiment) {
      const sl = turn.sentiment.toLowerCase();
      const sc = sl === 'positive' ? 'chip-sent-pos' : sl === 'negative' ? 'chip-sent-neg' : 'chip-sent-neu';
      chipsHtml += `<span class="chip ${sc}">${esc(turn.sentiment)}</span>`;
    }
    if (isGhost)      chipsHtml += `<span class="chip chip-ghost">ghost</span>`;
    if (isOverridden) chipsHtml += `<span class="chip chip-ovr">overridden</span>`;

    const mergedCount = turn.merged_count || (turn.sub_turns ? turn.sub_turns.length : 0);
    if (mergedCount > 1) {
      chipsHtml += `<span class="chip chip-merged">merged ${mergedCount}</span>`;
    }

    // Sub-turn drawer
    let subHtml = '';
    if (mergedCount > 1) {
      subHtml += `<button class="subturn-toggle" onclick="event.stopPropagation();toggleSubturnDrawer(${ti})">▾ ${mergedCount} segments</button>`;
      subHtml += `<div class="subturn-drawer" id="st-${ti}" style="display:none">`;
      if (turn.sub_turns && turn.sub_turns.length) {
        for (const st of turn.sub_turns) {
          subHtml += `<div class="subturn-row">
            <span class="subturn-ts">${fmtTime(st.start)}–${fmtTime(st.end)}</span>
            <span class="subturn-text">${esc(st.transcript || '')}</span>
          </div>`;
        }
      }
      subHtml += '</div>';
    }

    // Actions
    let actHtml;
    if (isDeleted) {
      actHtml = `<button class="icon-btn btn-restore" onclick="event.stopPropagation();doRestore(${ti})" title="Restore">↩</button>`;
    } else {
      let spOpts = '<option value="">— assign to —</option>';
      for (const sp of _speakers) {
        spOpts += `<option value="${esc(sp.ephemeral_id)}"${sp.ephemeral_id === effSp ? ' selected' : ''}>${esc(sp.display_name || sp.ephemeral_id)}</option>`;
      }
      actHtml = `
        <div class="reassign-wrap" id="rw-${ti}">
          <button class="icon-btn" onclick="event.stopPropagation();toggleReassign(${ti})" title="Reassign (R)">↺</button>
          <select class="reassign-select" id="rsel-${ti}" onchange="doAssign(${ti}, this.value)" style="display:none">${spOpts}</select>
        </div>
        <button class="icon-btn" onclick="event.stopPropagation();playAudio(${ti})" title="Play (P)">▶</button>
        <button class="icon-btn" onclick="event.stopPropagation();viewTurnFrame(${ti})" title="Frame (F)">◫</button>
        <button class="icon-btn btn-delete" onclick="event.stopPropagation();doDelete(${ti})" title="Delete (D)">⊘</button>
      `;
    }

    html += `
<div class="${classes}" data-ti="${ti}" data-sp="${esc(effSp)}" id="turn-${ti}" tabindex="0">
  <span class="turn-ts">${fmtTime(turn.start)}</span>
  <span class="speaker-dot" style="background:${color}"></span>
  <div class="turn-body">
    <div class="turn-speaker">${spHtml}</div>
    <div class="turn-transcript">${esc(turn.transcript || '')}</div>
    <div class="turn-chips">${chipsHtml}</div>
    ${subHtml}
  </div>
  <div class="turn-actions">${actHtml}</div>
</div>`;
  }

  if (!_allTurns.length) {
    html = '<div class="empty-state">No turns found for this session.</div>';
  }

  container.innerHTML = html;

  // Focus listeners
  container.querySelectorAll('.turn-row[data-ti]').forEach(row => {
    row.addEventListener('click', () => {
      document.querySelectorAll('.turn-row.focused').forEach(r => r.classList.remove('focused'));
      row.classList.add('focused');
    });
  });

  applyFilters();
}

  const btn = el.previousElementSibling;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (btn && btn.classList.contains('subturn-toggle')) {
    const count = el.querySelectorAll('.subturn-row').length;
    btn.textContent = isOpen ? `▾ ${count} segments` : `▴ ${count} segments`;

  document.getElementById('confirm-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('cm-name').focus(), 50);
}

function closeConfirmModal() {
  document.getElementById('confirm-modal').style.display = 'none';
}

async function doConfirmSave() {
  if (!_session) return;
  const sid   = _session.session_id;
  const name  = document.getElementById('cm-name').value.trim();
  const affil = document.getElementById('cm-affil').value.trim();
  const role  = document.getElementById('cm-role').value.trim();

  if (!name) { toast('Name is required', 'warn'); return; }

  showSpinner(true);
  try {
    let catId = _confirmCatalogueId;

    if (catId) {
      const fd = new FormData();
      fd.append('name', name);
      fd.append('affiliation', affil);
      fd.append('role', role);
      await api('PUT', `/speakers/${catId}`, fd);
    } else {
      const fd = new FormData();
      fd.append('name', name);
      fd.append('affiliation', affil);
      fd.append('role', role);
      const result = await api('POST', '/speakers', fd);
      catId = result.catalogue_id || result.id;
    }

    const lfd = new FormData();
    lfd.append('session_id', sid);
    lfd.append('ephemeral_id', _confirmEphId);
    lfd.append('catalogue_id', catId);
    await api('POST', '/link', lfd);

    toast('Speaker confirmed and linked', 'ok');
    closeConfirmModal();
    await loadReview(sid);
  } catch(e) {
    toast(e.message, 'err');
  } finally {
    showSpinner(false);
  }
}

// ── Link Modal ──
function openLinkModal(ephId) {
  _linkEphId = ephId;
  document.getElementById('lm-search').value = '';
  document.getElementById('lm-results').innerHTML = '';
  document.getElementById('link-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('lm-search').focus(), 50);
}

function closeLinkModal() {
  document.getElementById('link-modal').style.display = 'none';
}

function searchSpeakers(q) {
  if (_searchDebounce) clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(async () => {
    if (!q.trim()) {
      document.getElementById('lm-results').innerHTML = '';
      return;
    }
    try {
      const results = await api('GET', `/speakers?search=${encodeURIComponent(q)}`);
      renderLinkResults(Array.isArray(results) ? results : (results.speakers || []));
    } catch(e) {
      document.getElementById('lm-results').innerHTML =
        `<div style="color:var(--red);font-size:12px;padding:8px">${esc(e.message)}</div>`;
    }
  }, 300);
}

function renderLinkResults(results) {
  const container = document.getElementById('lm-results');
  if (!results.length) {
    container.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:8px;">No speakers found.</div>';
    return;
  }

  let html = '';
  for (const r of results) {
    const catId  = r.catalogue_id || r.id;
    const rName  = r.name || r.display_name || '—';
    const rAffil = [r.affiliation, r.role].filter(Boolean).join(' · ');
    html += `<div class="lm-result-row" onclick="doLinkSpeaker('${esc(catId)}')">
      <div>
        <div class="lm-result-name">${esc(rName)}</div>
        ${rAffil ? `<div class="lm-result-affil">${esc(rAffil)}</div>` : ''}
      </div>
      <button class="lm-link-btn" onclick="event.stopPropagation();doLinkSpeaker('${esc(catId)}')">Link</button>
    </div>`;
  }
  container.innerHTML = html;
}

async function doLinkSpeaker(catId) {
  if (!_session || !_linkEphId) return;
  const sid = _session.session_id;
  showSpinner(true);
  try {
    const fd = new FormData();
    fd.append('session_id', sid);
    fd.append('ephemeral_id', _linkEphId);
    fd.append('catalogue_id', catId);
    await api('POST', '/link', fd);
    toast('Speaker linked', 'ok');
    closeLinkModal();
    await loadReview(sid);
  } catch(e) {
    toast(e.message, 'err');
  } finally {
    showSpinner(false);
  }
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', e => {
  // Esc: close modals
  if (e.key === 'Escape') {
    if (document.getElementById('frame-modal').style.display   !== 'none') { closeFrameModal();   return; }
    if (document.getElementById('confirm-modal').style.display !== 'none') { closeConfirmModal(); return; }
    if (document.getElementById('link-modal').style.display    !== 'none') { closeLinkModal();    return; }
  }

  // Arrow keys in frame modal (only when opened from turn)
  if (document.getElementById('frame-modal').style.display !== 'none' && _fmFromTurn) {
    if (e.key === 'ArrowLeft')  { stepFrame(-1); return; }
    if (e.key === 'ArrowRight') { stepFrame(1);  return; }
  }

  // Don't trigger turn shortcuts while typing
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;

  const focused = document.querySelector('.turn-row.focused');
  if (!focused) return;
  const ti   = +focused.dataset.ti;
  const turn = _turnByIdx[ti];
  if (!turn || turn.deleted) return;

  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); toggleReassign(ti); }
  if (e.key === 'd' || e.key === 'D') { e.preventDefault(); doDelete(ti); }
  if (e.key === 'f' || e.key === 'F') { e.preventDefault(); viewTurnFrame(ti); }
  if (e.key === 'p' || e.key === 'P') { e.preventDefault(); playAudio(ti); }
});

// ── Core Flow ──
async function init() {
  await loadSessions();
}

async function loadSessions() {
  try {
    const sessions = await api('GET', '/sessions');
    const sel  = document.getElementById('session-select');
    const list = Array.isArray(sessions) ? sessions : (sessions.sessions || []);
    sel.innerHTML = '<option value="">— select session —</option>';
    for (const s of list) {
      const sid = s.session_id || s.id || s;
      const o   = document.createElement('option');
      o.value   = sid;
      o.textContent = sid;
      sel.appendChild(o);
    }
    // Auto-select the latest session (first in list, sorted by processed_at DESC)
    if (list.length > 0) {
      const latestSid = list[0].session_id || list[0].id || list[0];
      sel.value = latestSid;
      await loadReview(latestSid);
    }
  } catch(e) {
    toast('Failed to load sessions: ' + e.message, 'err');
  }
}

async function onSessionChange() {
  const sid = document.getElementById('session-select').value;
  if (!sid) {
    const rescanBtn = document.getElementById('rescan-btn');
    if (rescanBtn) rescanBtn.style.display = 'none';
    const rescanStatus = document.getElementById('rescan-status');
    if (rescanStatus) rescanStatus.style.display = 'none';
    if (_rescanPollTimer) { clearTimeout(_rescanPollTimer); _rescanPollTimer = null; }
    return;
  }
  showSpinner(true);
  try {
    await loadReview(sid);
  } catch(e) {
    toast(e.message, 'err');
  } finally {
    showSpinner(false);
  }
}

async function loadReview(sid) {
  // Reset state
  hiddenSpeakers.clear();
  const hg = document.getElementById('hide-ghosts');
  if (hg) hg.checked = false;
  _mergePreview  = null;
  _previewActive = false;
  Object.keys(_spColorCache).forEach(k => delete _spColorCache[k]);
  _spColorIdx = 0;

  const data = await api('GET', `/review/${sid}`);
  _session = data.session || {};
  _session.session_id = sid;

  const rescanBtn = document.getElementById('rescan-btn');
  const rescanStatus = document.getElementById('rescan-status');
  if (rescanBtn) rescanBtn.style.display = 'inline-block';
  if (rescanStatus) { rescanStatus.style.display = 'none'; rescanStatus.textContent = ''; }
  if (_rescanPollTimer) { clearTimeout(_rescanPollTimer); _rescanPollTimer = null; }

  _speakers   = data.speakers || [];
  _allEphIds  = data.all_ephemeral_ids || _speakers.map(s => s.ephemeral_id);

  // Seed colors in registration order
  for (const id of _allEphIds) spColor(id);

  // Speaker lookup
  _spById = {};
  for (const sp of _speakers) _spById[sp.ephemeral_id] = sp;

  // Collect all turns, deduplicate, sort
  const seenIdx = new Set();
  _allTurns = [];
  for (const sp of _speakers) {
    for (const t of (sp.turns || [])) {
      if (!seenIdx.has(t.index)) {
        seenIdx.add(t.index);
        _allTurns.push(t);
      }
    }
  }
  _allTurns.sort((a, b) => a.start - b.start);

  // Index lookup
  _turnByIdx = {};
  for (const t of _allTurns) _turnByIdx[t.index] = t;

  // Ghost map
  _ghostMap = buildGhostMap(_allTurns);

  // Clear merge counts
  document.getElementById('merge-counts').textContent = '';

  renderAll();
}

function renderAll() {
  renderSpeakers();
  renderTranscript();
  renderFrameGallery();
  renderNames();
  updateStats();
}

// ── Boot ──
init();
</script>
